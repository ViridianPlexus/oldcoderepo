<!DOCTYPE html>
<html>
<head>
<style>
body {
  background-color: #03031a;
  font-family: Arial, sans-serif;
  color: white;
}

/* Right side alphabet slider wrapper */
#letter-slider-wrapper {
  position: absolute;
  right: 20px;
  top: 120px;
  z-index: 999;
  height: 300px;
  display: flex;
  align-items: center;
}

/* Slider container rotated vertically */
#letter-slider-container {
  position: relative;
  width: 300px;
  transform: rotate(-90deg);
}

/* Range inputs styling */
#letter-slider-container input[type=range] {
  position: absolute;
  width: 100%;
  pointer-events: none;
  -webkit-appearance: none;
  background: transparent;
}

/* Slider thumbs */
#letter-slider-container input[type=range]::-webkit-slider-thumb {
  pointer-events: all;
  -webkit-appearance: none;
  height: 16px;
  width: 16px;
  border-radius: 50%;
  background: orange;
  border: 1px solid orange;
  cursor: pointer;
}

/* Slider track */
#letter-slider-container input[type=range]::-webkit-slider-runnable-track {
  height: 6px;
  background: rgba(255,165,0,0.2);
  border-radius: 3px;
  border: 1px solid orange;
}

/* Firefox support */
#letter-slider-container input[type=range]::-moz-range-thumb {
  height: 16px;
  width: 16px;
  border-radius: 50%;
  background: orange;
  border: 1px solid orange;
  cursor: pointer;
}
#letter-slider-container input[type=range]::-moz-range-track {
  height: 6px;
  background: rgba(255,165,0,0.2);
  border-radius: 3px;
  border: 1px solid orange;
}

/* Vertical letters column */
#letterColumn {
  display: flex;
  flex-direction: column;
  margin-left: 15px;
  font-size: 16px;
  font-weight: bold;
}

.letterActive {
  color: orange;
}
</style>
</head>
<body>

<div id="letter-slider-wrapper">
  <div id="letter-slider-container">
    <input type="range" min="0" max="25" value="0" step="1" id="minSlider">
    <input type="range" min="0" max="25" value="25" step="1" id="maxSlider">
  </div>

  <div id="letterColumn"></div>
</div>

<script>
const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
const minSlider = document.getElementById("minSlider");
const maxSlider = document.getElementById("maxSlider");
const letterColumn = document.getElementById("letterColumn");

// Create letter elements
letters.forEach(letter => {
  const span = document.createElement("span");
  span.textContent = letter;
  letterColumn.appendChild(span);
});

// Update letters highlighting based on slider
function updateLetters() {
  let min = parseInt(minSlider.value);
  let max = parseInt(maxSlider.value);

  if (min > max) [min, max] = [max, min];

  const spans = letterColumn.children;
  for (let i = 0; i < spans.length; i++) {
    if (i >= min && i <= max) {
      spans[i].style.display = "inline"; // show letter
    } else {
      spans[i].style.display = "none";   // hide letter
    }
  }
}
minSlider.oninput = updateLetters;
maxSlider.oninput = updateLetters;

updateLetters();
</script>

</body>
</html>
