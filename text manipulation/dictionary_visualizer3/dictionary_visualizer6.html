<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
overflow:hidden;
background:#000;
font-family:sans-serif;
}

/* control groups */

.control-group{
position:absolute;
bottom:20px;
display:grid;
gap:10px;
z-index:999;
}

#wasd-controls{
left:20px;
grid-template-areas:
". w ."
"a s d";
}

#arrow-controls{
right:20px;
grid-template-areas:
". up ."
"left down right";
}

.key{
width:45px;
height:45px;
background:rgba(255,165,0,0.15);
border:1px solid orange;
color:orange;
display:flex;
align-items:center;
justify-content:center;
border-radius:8px;
user-select:none;
font-weight:bold;
font-size:14px;
}

.key:active{
background:rgba(255,165,0,0.5);
}

#w{grid-area:w;}
#a{grid-area:a;}
#s{grid-area:s;}
#d{grid-area:d;}

#up{grid-area:up;}
#left{grid-area:left;}
#down{grid-area:down;}
#right{grid-area:right;}

/* ===================== */
/* vertical range slider */
/* ===================== */

.slider-wrapper{
position:absolute;
right:20px;
top:50%;
transform:translateY(-50%) rotate(-90deg);
width:260px;
height:40px;
z-index:999;
}

.slider-track{
width:100%;
height:6px;
background:#333;
position:absolute;
top:50%;
transform:translateY(-50%);
border-radius:6px;
}

input[type="range"]{
-webkit-appearance:none;
appearance:none;
width:100%;
background:transparent;
position:absolute;
pointer-events:none;
}

input[type="range"]::-webkit-slider-thumb{
-webkit-appearance:none;
height:18px;
width:18px;
background:orange;
border-radius:50%;
cursor:pointer;
pointer-events:auto;
border:2px solid black;
}

input[type="range"]::-moz-range-thumb{
height:18px;
width:18px;
background:orange;
border-radius:50%;
cursor:pointer;
pointer-events:auto;
}

</style>
</head>

<body>

<div id="wasd-controls" class="control-group">
<div class="key" id="w">W</div>
<div class="key" id="a">A</div>
<div class="key" id="s">S</div>
<div class="key" id="d">D</div>
</div>

<div id="arrow-controls" class="control-group">
<div class="key" id="up">▲</div>
<div class="key" id="left">◀</div>
<div class="key" id="down">▼</div>
<div class="key" id="right">▶</div>
</div>

<!-- vertical double slider -->

<div class="slider-wrapper">

<div class="slider-track" id="slider-track"></div>

<input type="range" min="0" max="100" value="20" id="slider-1">
<input type="range" min="0" max="100" value="80" id="slider-2">

</div>

<div id="3d-graph"></div>


<script type="module">

import ForceGraph3D from 'https://esm.sh/3d-force-graph';
import SpriteText from 'https://esm.sh/three-spritetext';

/* ========================= */
/* slider logic (CodePen) */
/* ========================= */

let sliderOne=document.getElementById("slider-1");
let sliderTwo=document.getElementById("slider-2");
let sliderTrack=document.getElementById("slider-track");

let minGap=5;
let sliderMaxValue=sliderOne.max;

function slideOne(){

if(parseInt(sliderTwo.value)-parseInt(sliderOne.value)<=minGap){
sliderOne.value=parseInt(sliderTwo.value)-minGap;
}

fillColor();

}

function slideTwo(){

if(parseInt(sliderTwo.value)-parseInt(sliderOne.value)<=minGap){
sliderTwo.value=parseInt(sliderOne.value)+minGap;
}

fillColor();

}

function fillColor(){

let percent1=(sliderOne.value/sliderMaxValue)*100;
let percent2=(sliderTwo.value/sliderMaxValue)*100;

sliderTrack.style.background=
`linear-gradient(to right,
#333 ${percent1}%,
orange ${percent1}%,
orange ${percent2}%,
#333 ${percent2}%)`;

console.log("Range:",{
min:sliderOne.value,
max:sliderTwo.value
});

}

sliderOne.oninput=slideOne;
sliderTwo.oninput=slideTwo;

fillColor();

/* ===================== */
/* load graph */
/* ===================== */

async function loadData(){

const response=await fetch("transformed_dictionary.txt");
const text=await response.text();

const lines=text.split("\n").map(l=>l.trim()).filter(l=>l.length>0);

const nodes=[];
const links=[];

lines.forEach((line)=>{

const match=line.match(/^([^\s]+)\s+(.*)$/);

if(match){

const word=match[1].replace(/[:.,]/g,"");
const definition=match[2].trim();

nodes.push({id:word,definition:definition});

if(nodes.length>1){
links.push({
source:nodes[nodes.length-2].id,
target:word
});
}

}

});

return{nodes,links};

}

loadData().then(gData=>{

if(!gData.nodes.length)return;

const Graph=ForceGraph3D({controlType:'fly'})
(document.getElementById("3d-graph"))

.graphData(gData)

.nodeThreeObject(node=>{
const sprite=new SpriteText(node.id);
sprite.color="orange";
sprite.textHeight=8;
return sprite;
})

.nodeThreeObjectExtend(true)

.nodeLabel(node=>`<b>${node.id}</b>: ${node.definition}`);

Graph.d3Force("charge").strength(-200);

});

</script>
</body>
</html>
