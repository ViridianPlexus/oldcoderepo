<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
  </style>
</head>

<body>
<div id="3d-graph"></div>

<script type="module">
import ForceGraph3D from 'https://esm.sh/3d-force-graph';
import SpriteText from 'https://esm.sh/three-spritetext';


/* -----------------------------
   Parse dictionary file
----------------------------- */
async function loadDictionary() {
  const response = await fetch("transformed_dictionary.txt");
  const text = await response.text();

  const lines = text.split("\n")
    .map(l => l.trim())
    .filter(l => l.length > 0);

  const nodes = [];
  const nodeMap = new Map();

  for (const line of lines) {
    const match = line.match(/^([^\s]+)\s*:\s*\(([^)]+)\)\s*(.*)$/);
    if (!match) continue;

    const word = match[1].replace(/[:.,]/g, "");
    const pos = match[2];
    const definition = match[3];

    const node = {
      id: word,
      pos,
      definition
    };

    nodes.push(node);
    nodeMap.set(word.toLowerCase(), node);
  }

  return { nodes, nodeMap };
}

/* -----------------------------
   Parse synonym file
----------------------------- */
async function loadSynonyms() {
  try {
    const response = await fetch("synonyms.txt");
    const text = await response.text();

    const synonymMap = new Map();

    // STEP 1: Split the text into raw blocks using "="
    const rawBlocks = text.split("=");
    console.log("STEP 1 - rawBlocks:", rawBlocks);

    // STEP 2: Trim whitespace from each block
    const trimmedBlocks = rawBlocks.map(function(block) {
      const trimmed = block.trim();
      console.log("Trimming block:", trimmed);
      return trimmed;
    });
    console.log("STEP 2 - trimmedBlocks:", trimmedBlocks);

    // STEP 3: Remove empty blocks
    const nonEmptyBlocks = trimmedBlocks.filter(function(block) {
      const keep = Boolean(block);
      console.log("Filtering block:", block, "Keep?", keep);
      return keep;
    });
    console.log("STEP 3 - nonEmptyBlocks:", nonEmptyBlocks);

    // FINAL RESULT
    const blocks = nonEmptyBlocks;
    console.log("FINAL blocks:", blocks);

    for (const block of blocks) {
      const lines = block.split("\n");

      let key = null;
      let synonyms = [];

      for (const line of lines) {
        if (line.startsWith("KEY:")) {
          key = line.replace("KEY:", "").replace(".", "").trim();
        }

        if (line.startsWith("SYN:")) {
          const synText = line.replace("SYN:", "");
          synonyms = synText.split(",")
            .map(s => s.trim().replace(".", ""))
            .filter(Boolean);
        }
      }

      if (key) {
        synonymMap.set(key.toLowerCase(), synonyms.map(s => s.toLowerCase()));
      }
    }

    return synonymMap;

  } catch (err) {
    console.warn("Synonym file not found or parse error:", err);
    return new Map();
  }
}

/* -----------------------------
   Build graph links
----------------------------- */
function buildLinks(nodes, nodeMap, synonymMap) {
  const links = [];
  const linkSet = new Set();

  for (const node of nodes) {
    const word = node.id.toLowerCase();

    const synonyms = synonymMap.get(word);
    if (!synonyms) continue;

    for (const syn of synonyms) {
      const targetNode = nodeMap.get(syn);
      if (!targetNode) continue;

      const a = word;
      const b = targetNode.id.toLowerCase();

      const key = a < b ? `${a}|${b}` : `${b}|${a}`;

      if (!linkSet.has(key)) {
        linkSet.add(key);

        links.push({
          source: node.id,
          target: targetNode.id
        });
      }
    }
  }

  return links;
}

/* -----------------------------
   Main loader
----------------------------- */
async function loadData() {
  try {
    const [{ nodes, nodeMap }, synonymMap] = await Promise.all([
      loadDictionary(),
      loadSynonyms()
    ]);

    const links = buildLinks(nodes, nodeMap, synonymMap);

    console.log("Nodes:", nodes.length);
    console.log("Links:", links.length);

    return { nodes, links };

  } catch (err) {
    console.error(err);
    return { nodes: [], links: [] };
  }
}

/* -----------------------------
   Render graph
----------------------------- */
loadData().then(gData => {

  if (gData.nodes.length === 0) {
    alert("No dictionary words loaded.");
    return;
  }

  const Graph = ForceGraph3D()
    (document.getElementById("3d-graph"))
    .graphData(gData)
    .nodeThreeObject(node => {
     const sprite = new SpriteText(node.id);
      sprite.color = "orange";
      sprite.textHeight = 8;
      return sprite;
    })
    .nodeThreeObjectExtend(true)
    .nodeLabel(node =>
      `<b>${node.id}</b> (${node.pos || ""})<br>${node.definition}`
    );

  Graph.d3Force("charge").strength(-200);

});

</script>
</body>
</html>
