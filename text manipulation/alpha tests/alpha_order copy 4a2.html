<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }

    .control-group {
      position: absolute;
      bottom: 20px;
      display: grid;
      gap: 10px;
      z-index: 999;
    }

    #wasd-controls {
      left: 20px;
      grid-template-areas:
        ". w ."
        "a s d";
    }

    #arrow-controls {
      right: 20px;
      grid-template-areas:
        ". up ."
        "left down right";
    }

    .key {
      width: 45px;
      height: 45px;
      background: rgba(255, 165, 0, 0.15);
      border: 1px solid orange;
      color: orange;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      user-select: none;
      font-weight: bold;
      font-size: 14px;
    }

    #perf-monitor {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.8);
      color: #00ff00;
      padding: 10px;
      font-family: monospace;
      font-size: 20px;
      z-index: 1000;
    }
  </style>
</head>

<body>

<div id="perf-monitor">
  <div>GPU draw calls: <span id="draw-calls">0</span></div>
  <div>GPU memory: <span id="gpu-mem">0</span> MB</div>
  <div>Geometries: <span id="geo-count">0</span></div>
</div>

<div id="3d-graph"></div>

<script type="module">
import ForceGraph3D from 'https://esm.sh/3d-force-graph';
import { CSS2DRenderer, CSS2DObject } from 'https://esm.sh/three/examples/jsm/renderers/CSS2DRenderer.js';

async function loadData() {
  const response = await fetch("transformed_dictionary.txt");
  const text = await response.text();

  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);

  const nodes = [];
  const links = [];

  lines.forEach(line => {
    const match = line.match(/^([^\s]+)\s+(.*)$/);
    if (match) {
      const word = match[1].replace(/[:.,]/g, "");
      const definition = match[2].trim();

      nodes.push({ id: word, definition });

      if (nodes.length > 1) {
        links.push({
          source: nodes[nodes.length - 2].id,
          target: word
        });
      }
    }
  });

  return { nodes, links };
}

loadData().then(gData => {

  if (!gData.nodes.length) return;

  const Graph = ForceGraph3D({ controlType: 'fly' })
    (document.getElementById("3d-graph"));

  // ---------------------------
  // CSS2D LABEL RENDERER
  // ---------------------------
  const labelRenderer = new CSS2DRenderer();
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.domElement.style.position = 'absolute';
  labelRenderer.domElement.style.top = '0';
  labelRenderer.domElement.style.pointerEvents = 'none';
  document.getElementById('3d-graph').appendChild(labelRenderer.domElement);

  // ---------------------------
  // IMPORTANT FIXES
  // ---------------------------
  const VISIBILITY_DISTANCE = 800; // realistic scale
  let visibilityEnabled = false;

  setTimeout(() => {
    visibilityEnabled = true;
  }, 2000);

  Graph
    .graphData(gData)

    .nodeThreeObject(node => {
      const div = document.createElement('div');
      div.textContent = node.id;

      div.style.color = 'orange';
      div.style.fontSize = '14px';
      div.style.padding = '2px 6px';
      div.style.background = 'rgba(0,0,0,0.4)';
      div.style.borderRadius = '4px';
      div.style.whiteSpace = 'nowrap';

      const label = new CSS2DObject(div);
      node.__label = label;

      return label;
    })

    .nodeThreeObjectExtend(true)

    .nodeLabel(node => `<b>${node.id}</b>: ${node.definition}`)

    .nodeVisibility(node => {
      if (!visibilityEnabled) return true; // CRITICAL FIX

      const camera = Graph.camera();
      const camPos = camera.position;

      const dist = Math.hypot(
        node.x - camPos.x,
        node.y - camPos.y,
        node.z - camPos.z
      );

      return dist < VISIBILITY_DISTANCE;
    })

    .onNodeClick(node => {
      const distance = 200;
      const camera = Graph.camera();
      const camPos = camera.position;

      const dx = node.x - camPos.x;
      const dy = node.y - camPos.y;
      const dz = node.z - camPos.z;

      const len = Math.hypot(dx, dy, dz);
      const ratio = distance / len;

      Graph.cameraPosition(
        {
          x: node.x - dx * ratio,
          y: node.y - dy * ratio,
          z: node.z - dz * ratio
        },
        node,
        1500
      );
    });

  Graph.d3Force("charge").strength(-200);

  // ---------------------------
  // RENDER LOOP
  // ---------------------------
  Graph.onEngineTick(() => {
    labelRenderer.render(Graph.scene(), Graph.camera());
  });

  // ---------------------------
  // RESIZE FIX
  // ---------------------------
  window.addEventListener('resize', () => {
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
  });

});

</script>
</body>
</html>
