<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
    
    /* Shared control styling */
    .control-group {
      position: absolute;
      bottom: 20px;
      display: grid;
      gap: 10px;
      z-index: 999;
    }

    /* Left side (WASD) */
    #wasd-controls {
      left: 20px;
      grid-template-areas: 
        ". w ."
        "a s d";
    }

    /* Right side (Arrows) */
    #arrow-controls {
      right: 20px;
      grid-template-areas: 
        ". up ."
        "left down right";
    }

    .key {
      width: 45px;
      height: 45px;
      background: rgba(255, 165, 0, 0.15);
      border: 1px solid orange;
      color: orange;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      user-select: none;
      font-weight: bold;
      font-size: 14px;
      -webkit-tap-highlight-color: transparent;
    }

    .key:active {
      background: rgba(255, 165, 0, 0.5);
    }

    /* Mapping areas */
    #w { grid-area: w; } #a { grid-area: a; } #s { grid-area: s; } #d { grid-area: d; }
    #up { grid-area: up; } #left { grid-area: left; } #down { grid-area: down; } #right { grid-area: right; }

    /* Right side alphabet slider */
#letter-slider-wrapper{
  position:absolute;
  right:20px;
  top:120px;
  z-index:999;
  display:flex;
  align-items:center;
}

/* slider */
#letter-slider-container{
  position:relative;
  width:300px;
  transform:rotate(-90deg);
}

/* vertical letters */
#letterColumn{
  display:flex;
  flex-direction:column;
  margin-left:20px;
  font-size:14px;
  color:rgba(255,165,0,0.3);
  font-weight:bold;
}

.letterActive{
  color:orange;
}

.wrapper{
  height:300px;
  display:flex;
  align-items:center;
}

.slider-container{
  position:relative;
  width:300px;
  transform:rotate(-90deg);
}

.slider-container input[type=range]{
  position:absolute;
  width:100%;
  pointer-events:none;
  -webkit-appearance:none;
  background:transparent;
}

input[type=range]::-webkit-slider-thumb{
  pointer-events:all;
  -webkit-appearance:none;
  height:16px;
  width:16px;
  border-radius:50%;
  background:orange;
  cursor:pointer;
}

input[type=range]::-webkit-slider-runnable-track{
  height:6px;
  background:rgba(255,165,0,0.3);
  border-radius:3px;
}

#letter-slider-ui{
  position:absolute;
  right:20px;
  top:120px;
  display:flex;
  align-items:center;
  z-index:999;
}

#letterColumn{
  display:flex;
  flex-direction:column;
  margin-left:18px;
  font-size:14px;
  font-weight:bold;
  color:rgba(255,165,0,0.25);
}

.letterActive{
  color:orange;
}

 #perf-monitor {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0, 0, 0, 0.8);
    color: #00ff00;
    padding: 10px;
    font-family: monospace;
    font-size: 20px;
    border: 1px solid #444;
    pointer-events: none;
    z-index: 1000;
}
</style>
</head>

<body>
<button id="hideNodesBtn" style="
position:absolute;
top:20px;
left:20px;
z-index:1000;
padding:10px;
background:black;
color:orange;
border:1px solid orange;
border-radius:6px;
">
Toggle Nodes
</button>

 <div id="perf-monitor">
    <div>GPU draw calls: <span id="draw-calls">0</span></div>
    <div>GPU memory: <span id="gpu-mem">0</span> MB</div>
    <div>Geometries: <span id="geo-count">0</span></div>
</div>


  <div id="wasd-controls" class="control-group">
    <div class="key" id="w">W</div>
    <div class="key" id="a">A</div>
    <div class="key" id="s">S</div>
    <div class="key" id="d">D</div>
  </div>

  <div id="arrow-controls" class="control-group">
    <div class="key" id="up">▲</div>
    <div class="key" id="left">◀</div>
    <div class="key" id="down">▼</div>
    <div class="key" id="right">▶</div>
  </div>

<div id="letter-slider-wrapper">
  <div id="letter-slider-container">
    <input type="range" min="0" max="25" value="0" step="1" id="minSlider">
    <input type="range" min="0" max="25" value="25" step="1" id="maxSlider">
  </div>

  <div id="letterColumn"></div>
</div>


  <div id="3d-graph"></div>

<script type="module">
  import * as THREE from 'https://esm.sh/three';
  import ForceGraph3D from 'https://esm.sh/3d-force-graph';

  function simulateKey(code, type) {
    window.dispatchEvent(new KeyboardEvent(type, { code: code, key: code, bubbles: true }));
  }

  const keyMap = { 'w':'KeyW','a':'KeyA','s':'KeyS','d':'KeyD','up':'ArrowUp','down':'ArrowDown','left':'ArrowLeft','right':'ArrowRight' };
  Object.keys(keyMap).forEach(id => {
    const el = document.getElementById(id);
    ['mousedown','touchstart'].forEach(evt => el.addEventListener(evt, (e) => { e.preventDefault(); simulateKey(keyMap[id], 'keydown'); }));
    ['mouseup','touchend'].forEach(evt => el.addEventListener(evt, (e) => { e.preventDefault(); simulateKey(keyMap[id], 'keyup'); }));
  });

  async function loadData() {
    const response = await fetch("all_transformed.txt");
    const text = await response.text();
    const nodes = [], links = [];

    text.split("\n").forEach(line => {
      const match = line.match(/^([^\s]+)\s+(.*)$/);
      if (match) {
        const word = match[1].replace(/[:.,]/g, "");
        nodes.push({ id: word, definition: match[2].trim() });

        if (nodes.length > 1)
          links.push({ source: nodes[nodes.length - 2].id, target: word });
      }
    });

    return { nodes, links };
  }

  loadData().then(gData => {

    const Graph = ForceGraph3D({ controlType: 'fly' })
      (document.getElementById("3d-graph"))
      .graphData(gData)

      // normal nodes instead of SpriteText
   
      .nodeLabel(node => `<b>${node.id}</b>: ${node.definition}`)




      .onNodeClick(node => {
        const distance = 200;
        const cam = Graph.camera().position;
        const dist = Math.hypot(node.x - cam.x, node.y - cam.y, node.z - cam.z);
        const ratio = distance / dist;

        Graph.cameraPosition(
          {
            x: node.x - (node.x-cam.x)*ratio,
            y: node.y - (node.y-cam.y)*ratio,
            z: node.z - (node.z-cam.z)*ratio
          },
          node,
          1500
        );
      });

const positions = new Float32Array(gData.nodes.length * 3);

const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

const material = new THREE.PointsMaterial({
  color: 'orange',
  size: 4
});

const points = new THREE.Points(geometry, material);

Graph.scene().add(points);

    Graph.d3Force("charge").strength(-200);

    Graph.onEngineTick(() => {
  gData.nodes.forEach((n, i) => {
    if (n.x == null) return;

    positions[i*3] = n.x;
    positions[i*3 + 1] = n.y;
    positions[i*3 + 2] = n.z;
  });

  geometry.attributes.position.needsUpdate = true;
});

    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    const minS = document.getElementById("minSlider");
    const maxS = document.getElementById("maxSlider");
    const col = document.getElementById("letterColumn");

    letters.forEach(l => {
      const d = document.createElement("div");
      d.textContent = l;
      col.appendChild(d);
    });

    function update() {
      let min = parseInt(minS.value);
      let max = parseInt(maxS.value);
      if (min > max) [min, max] = [max, min];

      const activeLetters = letters.slice(min, max + 1);

      Array.from(col.children).forEach((el, i) => {
        el.className = (i >= min && i <= max) ? "letterActive" : "";
      });

      Graph.graphData().nodes.forEach(n => {
        if (n.__threeObj) {
          n.__threeObj.visible = activeLetters.includes(n.id.charAt(0).toUpperCase());
        }
      });

      Graph.graphData().links.forEach(l => {
        if (l.__lineObj) {
          const sVis = l.source.__threeObj ? l.source.__threeObj.visible : true;
          const tVis = l.target.__threeObj ? l.target.__threeObj.visible : true;
          l.__lineObj.visible = sVis && tVis;
        }
      });
    }

    minS.oninput = update;
    maxS.oninput = update;

    let allVisible = true;
    document.getElementById("hideNodesBtn").onclick = () => {
      allVisible = !allVisible;
      Graph.graphData().nodes.forEach(n => {
        if(n.__threeObj) n.__threeObj.visible = allVisible;
      });
    };

    setTimeout(update, 1000);


      // 1. Get references to UI elements
    const drawCallsEl = document.getElementById('draw-calls');
    const memoryEl = document.getElementById('gpu-mem');
    const geoEl = document.getElementById('geo-count');

    // 2. Access the Three.js Renderer
    const renderer = Graph.renderer();

    // 3. Create an update loop
    function updateMetrics() {
        const info = renderer.info;
        
        // Update the UI
        drawCallsEl.innerText = info.render.calls;
        geoEl.innerText = info.memory.geometries;
        
        // Memory calculation (Approximate)
        // Note: info.memory provides counts. To get MB like the example,
        // you'd typically track your buffer sizes manually or use a specific extension.
        // For a quick estimate based on the example:
        const memMB = (info.memory.geometries * 0.5).toFixed(2); // Dummy multiplier for demo
        memoryEl.innerText = memMB;

        requestAnimationFrame(updateMetrics);
      }

    updateMetrics();
  });
</script>
</body>
</html>
