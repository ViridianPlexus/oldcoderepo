<script type="module">
  import ForceGraph3D from 'https://esm.sh/3d-force-graph';
import { CSS2DRenderer, CSS2DObject } from 'https://esm.sh/three/examples/jsm/renderers/CSS2DRenderer.js';

  // Simulation engine
  function simulateKey(code, type) {
    const event = new KeyboardEvent(type, {
      code: code,
      key: code,
      bubbles: true
    });
    window.dispatchEvent(event);
  }

  // Key mappings
  const keyMap = {
    'w': 'KeyW', 'a': 'KeyA', 's': 'KeyS', 'd': 'KeyD',
    'up': 'ArrowUp', 'down': 'ArrowDown', 'left': 'ArrowLeft', 'right': 'ArrowRight'
  };
  
  Object.keys(keyMap).forEach(id => {
    const el = document.getElementById(id);
    ['mousedown', 'touchstart'].forEach(evt => 
      el.addEventListener(evt, (e) => { e.preventDefault(); simulateKey(keyMap[id], 'keydown'); })
    );
    ['mouseup', 'touchend', 'touchcancel'].forEach(evt => 
      el.addEventListener(evt, (e) => { e.preventDefault(); simulateKey(keyMap[id], 'keyup'); })
    );
  });

  async function loadData() {
    try {
      const response = await fetch("transformed_dictionary.txt");
      const text = await response.text();
      const lines = text.split("\n").map(l => l.trim()).filter(l => l.length > 0);
      const nodes = [];
      const links = [];

      lines.forEach((line) => {
        const match = line.match(/^([^\s]+)\s+(.*)$/);
        if (match) {
          const word = match[1].replace(/[:.,]/g, "");
          const definition = match[2].trim();
          nodes.push({ id: word, definition: definition });
          if (nodes.length > 1) {
            links.push({ source: nodes[nodes.length - 2].id, target: word });
          }
        }
      });
      return { nodes, links };
    } catch (err) {
      console.error("Fetch error:", err);
      return { nodes: [], links: [] };
    }
  }

  loadData().then(gData => {
    if (gData.nodes.length === 0) return;

    const Graph = ForceGraph3D({ controlType: 'fly' })(document.getElementById("3d-graph"));

      const labelRenderer = new CSS2DRenderer();
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.domElement.style.position = 'absolute';
      labelRenderer.domElement.style.top = '0';
      labelRenderer.domElement.style.pointerEvents = 'none';
      
      document.getElementById('3d-graph').appendChild(labelRenderer.domElement);
     const VISIBILITY_DISTANCE = 50; // adjust this to your scale

     let visibilityEnabled = false;

setTimeout(() => {
  visibilityEnabled = true;
}, 2000);

  Graph
  .graphData(gData)
  .nodeThreeObject(node => {
    const div = document.createElement('div');
    div.textContent = node.id;

    div.style.color = 'orange';
    div.style.fontSize = '14px';
    div.style.padding = '2px 6px';
    div.style.background = 'rgba(0,0,0,0.4)';
    div.style.borderRadius = '4px';
    div.style.whiteSpace = 'nowrap';

    const label = new CSS2DObject(div);
    node.__label = label;

    return label;
  })
  .nodeThreeObjectExtend(true)
  .nodeLabel(node => `<b>${node.id}</b>: ${node.definition}`)
  .nodeVisibility(node => {
      if (!visibilityEnabled) return true;

      if (node.x == null || node.y == null || node.z == null) {
        return true;
      }

      const camera = Graph.camera();
      const camPos = camera.position;

      const dx = node.x - camPos.x;
      const dy = node.y - camPos.y;
      const dz = node.z - camPos.z;

      const dist = Math.hypot(dx, dy, dz);
      console.log(node.id, node.x, node.y, node.z);
      return dist < VISIBILITY_DISTANCE;
})

  Graph.d3Force("charge").strength(-200);

  // 1. Get references to UI elements
    const drawCallsEl = document.getElementById('draw-calls');
    const memoryEl = document.getElementById('gpu-mem');
    const geoEl = document.getElementById('geo-count');

    // 2. Access the Three.js Renderer
    const renderer = Graph.renderer();

    // 3. Create an update loop
    function updateMetrics() {
        const info = renderer.info;
        
        // Update the UI
        drawCallsEl.innerText = info.render.calls;
        geoEl.innerText = info.memory.geometries;
        
        // Memory calculation (Approximate)
        // Note: info.memory provides counts. To get MB like the example,
        // you'd typically track your buffer sizes manually or use a specific extension.
        // For a quick estimate based on the example:
        const memMB = (info.memory.geometries * 0.5).toFixed(2); // Dummy multiplier for demo
        memoryEl.innerText = memMB;

        requestAnimationFrame(updateMetrics);
      }

    updateMetrics();

      Graph.onEngineTick(() => {
  labelRenderer.render(Graph.scene(), Graph.camera());
});

  });



window.addEventListener('resize', () => {
