<!DOCTYPE html>
<html>
<head>
<style>



/* Right side alphabet slider */

#letter-slider-wrapper{
  position:absolute;
  right:20px;
  top:120px;
  z-index:999;
  height:300px;
  display:flex;
  align-items:center;
}

#letter-slider-container{
  position:relative;
  width:300px;
  transform:rotate(-90deg);
}

#letter-slider-container input[type=range]{
  position:absolute;
  width:100%;
  pointer-events:none;
  -webkit-appearance:none;
  background:transparent;
}

#letter-slider-container input[type=range]::-webkit-slider-thumb{
  pointer-events:all;
  -webkit-appearance:none;
  height:16px;
  width:16px;
  border-radius:50%;
  background:orange;
  border:1px solid orange;
  cursor:pointer;
}

#letter-slider-container input[type=range]::-webkit-slider-runnable-track{
  height:6px;
  background:rgba(255,165,0,0.2);
  border-radius:3px;
  border:1px solid orange;
}

</style>
</head>


<div id="letter-slider-wrapper">
  <div id="letter-slider-container">
    <input type="range" min="0" max="25" value="0" step="1" id="minSlider">
    <input type="range" min="0" max="25" value="25" step="1" id="maxSlider">
  </div>
</div>

<p style="
position:absolute;
right:20px;
top:430px;
color:orange;
font-weight:bold;
z-index:999;
">
Letters: <span id="output"></span>
</p>

<script>

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

const minSlider = document.getElementById("minSlider");
const maxSlider = document.getElementById("maxSlider");
const output = document.getElementById("output");

function update(){
  let min = parseInt(minSlider.value);
  let max = parseInt(maxSlider.value);

  if(min > max){
    [min,max] = [max,min];
  }

  output.textContent = letters.slice(min, max+1).join(" ");
}

minSlider.oninput = update;
maxSlider.oninput = update;

update();

</script>

</body>
</html>
