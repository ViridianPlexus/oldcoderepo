<!DOCTYPE html>
<html>
<head>
<style>
.slider-container{
  position:relative;
  width:300px;
}

.slider-container input[type=range]{
  position:absolute;
  width:100%;
  pointer-events:none;
  -webkit-appearance:none;
  background:transparent;
}

input[type=range]::-webkit-slider-thumb{
  pointer-events:all;
  -webkit-appearance:none;
  height:16px;
  width:16px;
  border-radius:50%;
  background:#333;
  cursor:pointer;
}

input[type=range]::-webkit-slider-runnable-track{
  height:6px;
  background:#ccc;
  border-radius:3px;
}
</style>
</head>

<body>

<div class="slider-container">
  <input type="range" min="0" max="25" value="0" step="1" id="minSlider">
  <input type="range" min="0" max="25" value="25" step="1" id="maxSlider">
</div>

<p>Letters: <span id="output"></span></p>

<script>
const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

const minSlider = document.getElementById("minSlider");
const maxSlider = document.getElementById("maxSlider");
const output = document.getElementById("output");

function update(){
  let min = parseInt(minSlider.value);
  let max = parseInt(maxSlider.value);

  if(min > max){
    [min,max] = [max,min];
  }

  output.textContent = letters.slice(min, max+1).join(" ");
}

minSlider.oninput = update;
maxSlider.oninput = update;

update();
</script>

</body>
</html>
