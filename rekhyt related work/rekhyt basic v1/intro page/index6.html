    // Purpose: This line declares a function called delay that takes one parameter, 
    // ms, which represents milliseconds.
    // Functionality: The function is designed to introduce a delay or pause in 
    // code execution for a specified number of milliseconds.
    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    // The purpose of this function is to process and update a 
    // 2D array over time, while pausing between updates.
    async function processArray() {
      do {

        //we obtain a random x and y value
        const randomU = Math.floor(Math.random() * array2D.length);
        const randomI = Math.floor(Math.random() * array2D[randomU].length);

        //we turn that randomy selected character grey
        array2D[randomU][randomI].style.color = "#5A5A5A";

        //we change the character
        const randomIndex = Math.floor(Math.random() * array.length);
        const randomElement = array[randomIndex];
        array2D[randomU][randomI].textContent = randomElement;

        //we turn the character white
        array2D[randomU][randomI].style.color = "white";

        //we increase the counter
        counter++;

        // rekhytCheck(array2D, randomU,randomI ) optional dfs implementation,
        // change as you see necessary 

        // Wait for 50 milliseconds before the next iteration
        await delay(5);

        //theoretically this runs continually, replacing every letter until we reach the same number
        //of reppetiittions as the number of total chars in the matrix
        //because length multiplied by width is the total number of characters
        //however, if you notice, not every latter will necessarily be replaced at least once
        //because characters are randomy selected, there may be some chars changed more than once
        //and other chars never changed at all
      } while (counter < ((array2D.length * array2D[0].length)*variable_scale));
